# https://developer.blender.org/docs/features/extensions/schema/1.0.0/
schema_version = "1.0.0"

id = "fbx_bundler"
version = "0.2.0"
name = "FBX Bundler"
tagline = "Export FBX with textures bundled in a companion folder"
maintainer = "Daniel Boxer <dani3lb0x3r@gmail.com>"
type = "add-on"
# website = ""

# https://docs.blender.org/manual/en/dev/advanced/extensions/tags.html
tags = ["Import-Export"]

blender_version_min = "4.2.0"

license = ["SPDX:GPL-3.0-or-later"]

[permissions]
files = "Export FBX and copy texture files to disk"

[build]
paths_exclude_pattern = ["__pycache__/", ".git/", "*.zip"]
